{% extends "base.html" %}
{% block title %}Delete Plan{% endblock %}
{% block page_heading %}Delete Plan{% endblock %}

{% block content %}
<section class="panel danger-panel">
    <div class="danger-icon"><i class="bi bi-exclamation-triangle"></i></div>
    <h1>Delete Plan</h1>
    <p>Are you sure you want to delete <strong>{{ plan.name }}</strong>?</p>
    <form method="post" data-confirm="Delete {{ plan.name }}?">
        {% csrf_token %}
        <div class="form-actions justify-content-center">
            <a href="{% url 'plans:plan_list' %}" class="btn btn-outline-secondary">Cancel</a>
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash me-1"></i>Delete Plan
            </button>
        </div>
    </form>
</section>
{% endblock %}
